<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Экономика және Кәсіпкерлік — Тест</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3e;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --text: #e2e8f0;
    --muted: #94a3b8;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── WELCOME SCREEN ── */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
    background: radial-gradient(ellipse at 50% 0%, rgba(108,99,255,0.18) 0%, transparent 70%);
  }

  .logo {
    font-family: 'Montserrat', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #6c63ff, #a78bfa, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 1.1rem;
    color: var(--muted);
    margin-bottom: 2.5rem;
  }

  .stats-row {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    text-align: center;
  }

  .stat-box .num {
    font-family: 'Montserrat', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent2);
  }

  .stat-box .label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .mode-selector {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mode-btn {
    background: var(--card);
    border: 2px solid var(--border);
    color: var(--muted);
    padding: 0.7rem 1.4rem;
    border-radius: 10px;
    font-size: 0.9rem;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    transition: all 0.2s;
  }

  .mode-btn.active {
    border-color: var(--accent);
    color: var(--accent2);
    background: rgba(108,99,255,0.1);
  }

  .start-btn {
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    color: white;
    border: none;
    padding: 1rem 3rem;
    border-radius: 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(108,99,255,0.35);
  }

  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(108,99,255,0.5);
  }

  /* ── QUIZ SCREEN ── */
  #quiz { display: none; min-height: 100vh; padding: 1.5rem; }

  .quiz-header {
    max-width: 760px;
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .progress-wrap {
    flex: 1;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #6c63ff, #a78bfa);
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .score-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.4rem 0.9rem;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--accent2);
    white-space: nowrap;
  }

  .card {
    max-width: 760px;
    margin: 0 auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 2rem;
    animation: fadeIn 0.35s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-num {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .q-text {
    font-size: 1.1rem;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 1.5rem;
    color: #f1f5f9;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .option {
    background: #12151f;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    cursor: pointer;
    font-size: 0.95rem;
    color: var(--text);
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    line-height: 1.5;
  }

  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(108,99,255,0.08);
    transform: translateX(3px);
  }

  .option .letter {
    min-width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    color: var(--muted);
    flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }

  .option.correct {
    border-color: var(--green);
    background: var(--green-bg);
    cursor: default;
    transform: none;
  }

  .option.correct .letter {
    background: var(--green);
    color: white;
  }

  .option.wrong {
    border-color: var(--red);
    background: var(--red-bg);
    cursor: default;
    transform: none;
  }

  .option.wrong .letter {
    background: var(--red);
    color: white;
  }

  .option:disabled {
    cursor: default;
    transform: none;
  }

  .next-btn {
    margin-top: 1.5rem;
    width: 100%;
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    color: white;
    border: none;
    padding: 0.9rem;
    border-radius: 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: none;
    transition: opacity 0.2s;
  }

  .next-btn:hover { opacity: 0.9; }

  /* ── RESULT SCREEN ── */
  #result {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: radial-gradient(ellipse at 50% 0%, rgba(108,99,255,0.18) 0%, transparent 70%);
  }

  .result-card {
    max-width: 520px;
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    text-align: center;
  }

  .result-emoji { font-size: 3.5rem; margin-bottom: 1rem; }

  .result-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 0.5rem;
  }

  .result-score {
    font-family: 'Montserrat', sans-serif;
    font-size: 3.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 1rem 0;
  }

  .result-breakdown {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .rb {
    background: #12151f;
    border-radius: 10px;
    padding: 0.7rem 1.2rem;
    font-family: 'Montserrat', sans-serif;
  }

  .rb .rnum { font-size: 1.4rem; font-weight: 800; }
  .rb .rlabel { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .rb.green .rnum { color: var(--green); }
  .rb.red .rnum { color: var(--red); }

  .retry-btn {
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    color: white;
    border: none;
    padding: 0.9rem 2.5rem;
    border-radius: 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .retry-btn:hover { transform: translateY(-2px); }

  .restart-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 0.9rem;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.2s, color 0.2s;
  }

  .restart-btn:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* ── PARTS GRID ── */
  .parts-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.75rem;
    margin-bottom: 2rem;
    max-width: 560px;
    width: 100%;
  }

  .part-btn {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 0.9rem 0.5rem;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
    transition: all 0.2s;
  }

  .part-btn:hover {
    border-color: var(--accent);
    background: rgba(108,99,255,0.08);
    transform: translateY(-2px);
  }

  .part-btn.active {
    border-color: var(--accent);
    background: rgba(108,99,255,0.15);
  }

  .part-btn .part-num {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--accent2);
  }

  .part-btn.active .part-num {
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .part-btn .part-range {
    font-size: 0.65rem;
    color: var(--muted);
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
  }

  /* Responsive */
  @media(max-width: 480px) {
    .card { padding: 1.25rem; }
    .q-text { font-size: 1rem; }
    .option { font-size: 0.88rem; padding: 0.75rem 1rem; }
    .logo { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome">
  <div class="logo">ЖАКОНЫҢ ТУЫНДЫСЫ</div>
  <div class="subtitle">Экономика және Кәсіпкерлік</div>

  <div style="margin-bottom:1.2rem; color:var(--muted); font-size:0.9rem; font-family:'Montserrat',sans-serif; font-weight:600;">БӨЛІМДІ ТАҢДАҢЫЗ</div>

  <div class="parts-grid">
    <button class="part-btn active" onclick="selectPart(this,0)">
      <span class="part-num">1</span>
      <span class="part-range">1 – 30</span>
    </button>
    <button class="part-btn" onclick="selectPart(this,1)">
      <span class="part-num">2</span>
      <span class="part-range">31 – 60</span>
    </button>
    <button class="part-btn" onclick="selectPart(this,2)">
      <span class="part-num">3</span>
      <span class="part-range">61 – 90</span>
    </button>
    <button class="part-btn" onclick="selectPart(this,3)">
      <span class="part-num">4</span>
      <span class="part-range">91 – 120</span>
    </button>
    <button class="part-btn" onclick="selectPart(this,4)">
      <span class="part-num">5</span>
      <span class="part-range">121 – 150</span>
    </button>
    <button class="part-btn" onclick="selectPart(this,5)">
      <span class="part-num">6</span>
      <span class="part-range">151 – 180</span>
    </button>
    <button class="part-btn" onclick="selectPart(this,6)">
      <span class="part-num">7</span>
      <span class="part-range">181 – 210</span>
    </button>
    <button class="part-btn" onclick="selectPart(this,7)">
      <span class="part-num">8</span>
      <span class="part-range">211 – 240</span>
    </button>
    <button class="part-btn" onclick="selectPart(this,8)">
      <span class="part-num">9</span>
      <span class="part-range">241 – 270</span>
    </button>
    <button class="part-btn" onclick="selectPart(this,9)">
      <span class="part-num">10</span>
      <span class="part-range">271 – 300</span>
    </button>
  </div>

  <button class="start-btn" onclick="startQuiz()">Бастау →</button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="quiz-header">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="prog-text">1 / 20</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="score-badge">✓ <span id="score-live">0</span></div>
    <button class="restart-btn" onclick="goHome()" title="Бастапқыға оралу">↩ Рестарт</button>
  </div>

  <div class="card">
    <div class="q-num" id="q-num">СҰРАҚ 1</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Келесі сұрақ →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" style="display:none; min-height:100vh; align-items:center; justify-content:center; padding:2rem; background:radial-gradient(ellipse at 50% 0%, rgba(108,99,255,0.18) 0%, transparent 70%);">
  <div class="result-card">
    <div class="result-emoji" id="res-emoji">🎉</div>
    <div class="result-title" id="res-title">Керемет!</div>
    <div class="result-score" id="res-score">0%</div>
    <div class="result-breakdown">
      <div class="rb green">
        <div class="rnum" id="res-correct">0</div>
        <div class="rlabel">Дұрыс</div>
      </div>
      <div class="rb red">
        <div class="rnum" id="res-wrong">0</div>
        <div class="rlabel">Қате</div>
      </div>
      <div class="rb">
        <div class="rnum" id="res-total">0</div>
        <div class="rlabel">Барлығы</div>
      </div>
    </div>
    <button class="retry-btn" onclick="goHome()">↩ Бөлімді таңдау</button>
  </div>
</div>

let questions = [];
let current = 0;
let score = 0;
let selectedPart = 0;
const letters = ['A','B','C','D','E'];

function selectPart(btn, partIndex) {
  document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedPart = partIndex;
}

function startQuiz() {
  const start = selectedPart * 30;
  const end = start + 30;
  questions = ALL_QUESTIONS.slice(start, end);
  current = 0;
  score = 0;
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const total = questions.length;

  document.getElementById('q-num').textContent = `СҰРАҚ ${current + 1}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('prog-text').textContent = `${current + 1} / ${total}`;
  const pct = Math.round((current / total) * 100);
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('score-live').textContent = score;
  document.getElementById('next-btn').style.display = 'none';

  const container = document.getElementById('options');
  container.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, q.correct);
    container.appendChild(btn);
  });
}

function selectAnswer(chosen, correct) {
  const btns = document.querySelectorAll('.option');
  btns.forEach(b => { b.disabled = true; b.onclick = null; });

  if (chosen === correct) {
    btns[chosen].classList.add('correct');
    score++;
    document.getElementById('score-live').textContent = score;
  } else {
    btns[chosen].classList.add('wrong');
    btns[correct].classList.add('correct');
  }

  document.getElementById('next-btn').style.display = 'block';
  document.getElementById('next-btn').textContent =
    current + 1 < questions.length ? 'Келесі сұрақ →' : 'Нәтижені көру →';
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  const resultEl = document.getElementById('result');
  resultEl.style.display = 'flex';

  const total = questions.length;
  const wrong = total - score;
  const pct = Math.round((score / total) * 100);

  document.getElementById('res-score').textContent = pct + '%';
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-total').textContent = total;

  let emoji, title;
  if (pct >= 90) { emoji = '🏆'; title = 'Тамаша! Керемет нәтиже!'; }
  else if (pct >= 75) { emoji = '🎉'; title = 'Жақсы! Өте жақсы нәтиже!'; }
  else if (pct >= 60) { emoji = '👍'; title = 'Жаман емес, алға!'; }
  else if (pct >= 40) { emoji = '📚'; title = 'Материалды қайта оқу керек'; }
  else { emoji = '💪'; title = 'Тырысып көр, бәрі болады!'; }

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title;
}

function goHome() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('welcome').style.display = 'flex';
}
</script>
</body>
</html>
